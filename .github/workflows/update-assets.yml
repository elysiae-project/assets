name: Update Elysiae Assets
on:
  push:
    paths:
      - ".github/workflows/update-assets.yml"
      - "assetUpdater.js"
  schedule:
    - cron: "15 8/6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Install dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt update
          sudo apt install ffmpeg
      - name: Run asset updater
        run: |
          node assetUpdater.js
      - name: Push changes to repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: update Elysiae assets registry" && git push origin HEAD:main || echo "No changes are necessary"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: update-assets
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4